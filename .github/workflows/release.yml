name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Assemble & publish release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-configuration-cache --stacktrace

      - name: Stage split APKs
        run: |
          mkdir -p artifacts
          VERSION="${GITHUB_REF_NAME:-manual}"
          cp app/build/outputs/apk/release/app-arm64-v8a-release.apk "artifacts/AGallery-${VERSION}-arm64.apk"
          cp app/build/outputs/apk/release/app-x86_64-release.apk "artifacts/AGallery-${VERSION}-x86_64.apk"
          cat > artifacts/NOTES.md <<EOF
          ## AGallery ${VERSION}

          ### 📥 Which file should you download?
          - **\`AGallery-${VERSION}-arm64.apk\`** — for (almost) every Android phone (64-bit ARM). **If in doubt, pick this one.**
          - **\`AGallery-${VERSION}-x86_64.apk\`** — only for emulators / Intel x86 devices & some ChromeOS. Regular phones **do not need** this file.

          > Both files are the same app; they only differ in CPU architecture. Just install one.
          EOF
          ls -la artifacts

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AGallery-release-apk
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
          body_path: artifacts/NOTES.md

